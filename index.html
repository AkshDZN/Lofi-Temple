<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Temple</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- time -->
    <div class="timebx">
        <div class="time" id="time">12:38</div>
        <div class="ampmbx">
            <div class="ampm" id="am">AM</div>
            <div class="ampm" id="pm">PM</div>
        </div>
    </div>

    <div class="toolbox">
        <img src="assets/icons/zen_mode.svg" alt="zen_mode" class="tool">
        <img src="assets/icons/calendar.svg" alt="calendar" class="tool">
        <img src="assets/icons/todo_list.svg" alt="todo_list" class="tool">
        <img src="assets/icons/pomodoro+timers.svg" alt="pomodoro" class="tool">
        <img src="assets/icons/add_note_folder_drawing.svg" alt="add_note_folder_drawing" class="tool">
        <img src="assets/icons/settings.svg" alt="settings" class="tool">
    </div>

    <div class="friends">
        <img src="assets/icons/friends.svg" alt="friends" class="tool">
        <div class="normaltext">FRIENDS</div>
    </div>

    <div class="mixer">
        <img src="assets/icons/mixer.svg" alt="friends" class="tool">
        <div class="normaltext">MIXER</div>
    </div>

    <script src="index.js"></script>



</body>
</html>
